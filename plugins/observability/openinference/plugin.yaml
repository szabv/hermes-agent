name: openinference
version: "1.0.0"
description: "Optional OpenInference/OTLP tracing for Hermes — exports agent, LLM, and tool spans to any OpenTelemetry-compatible backend (Phoenix, Arize, Langfuse, Jaeger/Tempo, Honeycomb, Grafana, …). Opt-in via `hermes plugins enable observability/openinference` (or check the box in `hermes plugins`)."
author: NousResearch
hooks:
  - pre_api_request
  - post_api_request
  - pre_llm_call
  - post_llm_call
  - pre_tool_call
  - post_tool_call
  - on_session_finalize
  - on_session_reset
